name: Sync Content from Google Sheets

on:
  workflow_dispatch:       # manual trigger from GitHub UI
  schedule:
    - cron: '0 3 * * *'   # daily at 03:00 UTC

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to push updated JSON files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tools/content_pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r tools/content_pipeline/requirements.txt

      - name: Convert Google Sheets → JSON
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python tools/content_pipeline/convert_sheets.py

      - name: Validate output
        run: python tools/content_pipeline/validate_data.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync content from Google Sheets [skip ci]"
            git push
          fi
